name: Flight Watch

on:
  schedule:
    - cron: "13,43 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force-check all enabled watches now, ignoring their interval"
        type: boolean
        default: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight watch
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python flight_watch.py ${{ inputs.force == true && '--force' || '' }}

      - name: Persist state
        run: |
          git config user.name "flight-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json watches.json
          git diff --cached --quiet || git commit -m "Update price state"
          git pull --rebase -q
          git push
